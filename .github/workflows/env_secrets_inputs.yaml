name: Demo CI ENV Secrets

on:
    # push:
        # branches: [ "main" ]
    # pull_request:
    #     branches: [ "main" ]
    [workflow_dispatch]
env:
  Global_APP_ENV: Global-DEV
jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JOB_APP_ENV: Job-DEV

    steps:
      - uses: actions/checkout@v4

      - name: Say Hello
        run: echo "Hello from the second workflow!"

      - name: Install
        env:
          APP_ENV: DEV
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: echo "Environment - $APP_ENV, Global Environment - $Global_APP_ENV, Job Environment - $JOB_APP_ENV"

      - name: Create Demo File
        run: |
          echo "Create a Demo file for artifact" > demo_file.txt
          echo "Demo file was successfully created."

      - name: Upload Artifact Demo
        uses: actions/upload-artifact@v7
        with:
          name: Build-Artifact-Demo
          path: demo_file.txt
  Test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Test Job
        run: echo "This is a test job that runs after the build job."