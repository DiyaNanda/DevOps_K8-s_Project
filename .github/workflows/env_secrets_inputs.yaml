name: Demo CI ENV Secrets

on:
    push:
        branches: [ "main" ]
    # pull_request:
    #     branches: [ "main" ]
    workflow_dispatch:
env:
  Global_APP_ENV: Global-DEV
jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JOB_APP_ENV: Job-DEV

    steps:
      - uses: actions/checkout@v4

      - name: Say Hello
        run: echo "Hello from the second workflow!"

      - name: Install
        env:
          APP_ENV: DEV
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: echo "Environment - $APP_ENV, Global Environment - $Global_APP_ENV, Job Environment - $JOB_APP_ENV"