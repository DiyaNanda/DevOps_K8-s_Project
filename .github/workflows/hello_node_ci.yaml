name: Push Node App image to Dockerhub

on:
    push
       
jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Install dependencies for Docker
        working-directory: docker/app1-hello/node
        run: npm ci
    
      - name: Upload test Reports (if any)
        run: npm test --if-present


  Docker-image-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: docker/app1-hello/node
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hello-node:latest
            ${{ secrets.DOCKER_USERNAME }}/hello-node:${{github.sha}}
            ${{ secrets.DOCKER_USERNAME }}/hello-node:${{github.ref_name}}
