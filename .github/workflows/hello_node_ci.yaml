name: Push Node App image to Dockerhub

on:
    push
       
jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up jdk
        uses: actions/setup-java@v5
        with:
            distribution: 'temurin' # See 'Supported distributions' for available options
            java-version: '25'
    
      - name: Build and test (with Maven)
        working-directory: docker/app1-hello/node
        run: mvn -B clean package
    
      - name: Upload test Reports
        run: echo ""


  Docker-image-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up jdk
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build JAR for Docker
        working-directory: docker/app1-hello/node
        run: mvn -B -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: docker/app1-hello/node
          push: true
          tags: 
            ${{ secrets.DOCKER_USERNAME }}/hello-node:latest
            ${{ secrets.DOCKER_USERNAME }}/hello-node:${{github.sha}}
            ${{ secrets.DOCKER_USERNAME }}/hello-node:${{github.ref_name}}
