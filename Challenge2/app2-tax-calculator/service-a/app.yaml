apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec: 
      containers: 
      - name: service-a 
        image: embarkx/tax-service-a:latest
        ports:
        - containerPort: 3000
        env:
        - name: TAX_SERVICE_URL
          value: "http://service-b:4000"

---

apiVersion: v1
kind: Service
metadata:
  name: service-a
spec:
  type: NodePort
  selector:
    app: service-a
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32001

      
